{% extends "base.html" %}

{% block title %}标签 — {{ config.siteName }}{% endblock %}

{% block main %}
    <section class="content">
        <main class="posts">
            <h1>全部标签</h1>

            {% if tags|length > 0 %}
                <div class="tags-cloud">
                    {% for tag in tags %}
                        <span class="tag"><a href="{{ tag.link }}">{{ tag.name }}<span class="tag-count">{{ tag.count }}</span></a></span>
                    {% endfor %}
                </div>
            {% else %}
                <p>暂无标签。</p>
            {% endif %}
        </main>
    </section>
{% endblock %}
